name: CI

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-gcc:
    name: Linux x86-64 · GCC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libnode-dev
      - name: Build
        run: make clean && make CC=gcc
      - name: Test
        run: ./neodax -h | head -3

  linux-clang:
    name: Linux x86-64 · Clang
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang libnode-dev
      - name: Build
        run: make clean && make CC=clang
      - name: Test
        run: ./neodax -h | head -1

  linux-arm64:
    name: Linux ARM64 · GCC
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libnode-dev
      - name: Build
        run: make clean && make
      - name: Test
        run: ./neodax -h | head -1

  macos-arm64:
    name: macOS ARM64 · Apple Clang
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: make clean && make
      - name: Test
        run: ./neodax -h | head -1

  node-matrix:
    name: Node ${{ matrix.node }} · Linux x64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential python3
      - name: Install headers
        run: |
          npm install -g node-gyp
          node-gyp install
          NODE_INC=$(node -p "require('path').join(process.execPath, '../../include/node')")
          echo "NODE_INC=$NODE_INC" >> $GITHUB_ENV
      - name: Build & Test
        run: |
          bash build_js.sh
          node js/test/basic.js

  ci-pass:
    name: CI Pass
    needs: [ linux-gcc, linux-clang, linux-arm64, macos-arm64, node-matrix ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Results
        run: |
          if [[ "${{ needs.linux-gcc.result }}" != "success" ]] || \
             [[ "${{ needs.linux-arm64.result }}" != "success" ]]; then
            echo "Critical platforms failed!"
            exit 1
          fi
          echo "Main platforms are green!"
