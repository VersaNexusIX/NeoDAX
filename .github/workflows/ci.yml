name: CI

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  Linux x86-64 — GCC
  # ─────────────────────────────────────────────────────────────────
  linux-gcc:
    name: Linux x86-64 · GCC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libnode-dev

      - name: Build (GCC)
        run: make clean && make CC=gcc

      - name: CLI smoke test
        run: |
          ./neodax -h | head -3
          ./neodax /bin/ls > /dev/null
          ./neodax -x /bin/ls > /dev/null
          ./neodax -e /bin/ls > /dev/null
          ./neodax -V /bin/ls > /dev/null
          echo "CLI OK"

      - name: JS addon test
        run: node js/test/basic.js

  # ─────────────────────────────────────────────────────────────────
  #  Linux x86-64 — Clang
  # ─────────────────────────────────────────────────────────────────
  linux-clang:
    name: Linux x86-64 · Clang
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang libnode-dev

      - name: Build (Clang)
        run: make clean && make CC=clang

      - name: Test
        run: |
          ./neodax -h | head -1
          node js/test/basic.js

  # ─────────────────────────────────────────────────────────────────
  #  Linux ARM64
  # ─────────────────────────────────────────────────────────────────
  linux-arm64:
    name: Linux ARM64 · GCC
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libnode-dev

      - name: Build
        run: make clean && make

      - name: Test
        run: |
          ./neodax -h | head -1
          node js/test/basic.js

  # ─────────────────────────────────────────────────────────────────
  #  macOS ARM64 (Apple Silicon)
  # ─────────────────────────────────────────────────────────────────
  macos-arm64:
    name: macOS ARM64 · Apple Clang
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: make clean && make

      - name: Test
        run: |
          ./neodax -h | head -1
          node js/test/basic.js

  # ─────────────────────────────────────────────────────────────────
  #  macOS x86-64
  # ─────────────────────────────────────────────────────────────────
  macos-x64:
    name: macOS x86-64 · Apple Clang
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: make clean && make

      - name: Test
        run: |
          ./neodax -h | head -1
          node js/test/basic.js

  # ─────────────────────────────────────────────────────────────────
  #  Node.js multi-version matrix (Linux x64)
  #  Uses setup-node which provides headers via node-gyp install
  # ─────────────────────────────────────────────────────────────────
  node-matrix:
    name: Node ${{ matrix.node }} · Linux x64
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential python3

      - name: Install Node.js dev headers via node-gyp
        run: |
          npm install -g node-gyp
          # Download headers for the active Node version
          node-gyp install
          NODE_MAJOR=$(node --version | sed 's/v//' | cut -d. -f1)
          # Find where node-gyp put the headers
          GYPS=$(node -p "require('path').join(require('os').homedir(), '.cache', 'node-gyp')")
          echo "node-gyp cache: $GYPS"
          ls "$GYPS/" 2>/dev/null || true
          # Export for build_js.sh
          NODE_INC=$(find ~/.cache/node-gyp ~/.node-gyp /root/.cache/node-gyp /root/.node-gyp \
            2>/dev/null -name "node_api.h" | head -1 | xargs dirname 2>/dev/null || true)
          if [ -z "$NODE_INC" ]; then
            # fallback: try the include that ships with the system node
            NODE_INC=$(node -p "require('path').join(process.execPath, '../../include/node')")
          fi
          echo "NODE_INC=$NODE_INC" >> $GITHUB_ENV
          echo "Node headers at: $NODE_INC"
          ls "$NODE_INC/node_api.h" && echo "node_api.h found"

      - name: Build JS addon
        run: |
          # Pass the header path explicitly if found
          if [ -n "$NODE_INC" ] && [ -f "$NODE_INC/node_api.h" ]; then
            bash build_js.sh
          else
            bash build_js.sh
          fi

      - name: Test
        run: node js/test/basic.js

  # ─────────────────────────────────────────────────────────────────
  #  Summary gate — required to merge PRs
  # ─────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [ linux-gcc, linux-clang, macos-arm64 ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [ "${{ needs.linux-gcc.result }}"   != "success" ] || \
             [ "${{ needs.linux-clang.result }}" != "success" ] || \
             [ "${{ needs.macos-arm64.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
