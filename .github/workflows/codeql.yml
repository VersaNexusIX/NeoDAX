name: CodeQL

# Static security analysis — runs on push to main, PRs, and weekly.
# Scans C source code for common vulnerabilities (buffer overflows,
# integer overflows, memory safety issues).

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'js/src/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'js/src/**'
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC

permissions:
  actions:          read
  contents:         read
  security-events:  write

jobs:
  analyze:
    name: CodeQL · C
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libnode-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          # Include custom queries for security issues common in
          # binary parsers: integer overflow, OOB reads, format strings
          queries: security-and-quality

      - name: Build for CodeQL
        run: make clean && make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp
