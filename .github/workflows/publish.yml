name: Publish

# Triggered when you push a tag like v1.0.0 or v1.2.3-beta.1
# Workflow:
#   1. Run CI (build + test) on Linux and macOS
#   2. Build prebuilds on all platforms (linux-x64, linux-arm64, darwin-arm64, darwin-x64)
#   3. Bundle prebuilds into the npm package
#   4. Publish to npm
#   5. Create GitHub Release with changelog and attached .node files
#
# Required secrets:
#   NPM_TOKEN — npm automation token (Settings → Secrets → Actions)
#               Generate at: https://www.npmjs.com/settings/<user>/tokens
#               Token type: Automation

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + test but do not publish)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  id-token: write   # for npm provenance

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  1. Validate version tag matches package.json
  # ─────────────────────────────────────────────────────────────────
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract and validate version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ]; then
            TAG="v$(node -p "require('./js/package.json').version")"
            echo "No tag — using package.json version: $TAG"
          fi
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./js/package.json').version")

          echo "Tag:           $TAG"
          echo "Version:       $VERSION"
          echo "package.json:  $PKG_VERSION"

          if [ "$VERSION" != "$PKG_VERSION" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            echo "ERROR: tag $TAG does not match package.json version $PKG_VERSION"
            echo "Update js/package.json version to $VERSION before tagging."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────
  #  2. Build & test on Linux + macOS
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test · ${{ matrix.label }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-latest
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends build-essential libnode-dev

          - label: macOS ARM64
            os: macos-latest
            setup: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Build
        run: make clean && make

      - name: CLI test
        run: |
          ./neodax -h | head -1
          ./neodax -x /bin/ls > /dev/null
          echo "CLI OK"

      - name: Addon test
        run: node js/test/basic.js

  # ─────────────────────────────────────────────────────────────────
  #  3. Build prebuilds on all platforms
  # ─────────────────────────────────────────────────────────────────
  prebuilds:
    name: Prebuild · ${{ matrix.label }}
    needs: [ validate, test ]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:    linux-x64
            os:       ubuntu-latest
            platform: linux
            arch:     x64
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends build-essential libnode-dev

          - label:    linux-arm64
            os:       ubuntu-24.04-arm
            platform: linux
            arch:     arm64
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends build-essential libnode-dev

          - label:    darwin-arm64
            os:       macos-latest
            platform: darwin
            arch:     arm64
            setup:    ''

          - label:    darwin-x64
            os:       macos-13
            platform: darwin
            arch:     x64
            setup:    ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Build
        run: make clean && make

      - name: Stage prebuild
        run: |
          mkdir -p js/prebuilds
          cp js/neodax.node "js/prebuilds/neodax-${{ matrix.platform }}-${{ matrix.arch }}.node"
          echo "Staged: neodax-${{ matrix.platform }}-${{ matrix.arch }}.node"
          file "js/prebuilds/neodax-${{ matrix.platform }}-${{ matrix.arch }}.node"

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.label }}
          path: js/prebuilds/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  #  4. Bundle + publish to npm
  # ─────────────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: [ validate, prebuilds ]
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential libnode-dev

      - name: Build CLI + addon (Linux x64 for local use)
        run: make clean && make

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: js/prebuilds/
          merge-multiple: true

      - name: List prebuilds
        run: |
          echo "Prebuilds to include in package:"
          ls -lh js/prebuilds/

      - name: Verify all expected prebuilds present
        run: |
          MISSING=0
          for expected in \
            neodax-linux-x64.node \
            neodax-linux-arm64.node \
            neodax-darwin-arm64.node \
            neodax-darwin-x64.node; do
            if [ ! -f "js/prebuilds/$expected" ]; then
              echo "MISSING: $expected"
              MISSING=$((MISSING+1))
            else
              echo "OK: $expected  ($(stat -c%s "js/prebuilds/$expected") bytes)"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING prebuild(s) missing"
            exit 1
          fi

      - name: Run final tests
        run: node js/test/basic.js

      - name: Update package.json version from tag
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('js/package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('js/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json version set to', pkg.version);
          "

      - name: Dry run — show what would be published
        if: github.event.inputs.dry_run == 'true'
        run: |
          cd js
          npm pack --dry-run
          echo "DRY RUN — not publishing"

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: |
          cd js
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─────────────────────────────────────────────────────────────────
  #  5. Create GitHub Release
  # ─────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [ validate, publish ]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: release-assets/
          merge-multiple: true

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/VersaNexusIX/NeoDAX/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file (avoids shell escaping issues)
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.validate.outputs.tag }}
          name:       "NeoDAX ${{ needs.validate.outputs.tag }}"
          body_path:  release_notes.md
          draft:      false
          prerelease: ${{ contains(needs.validate.outputs.tag, '-') }}
          files: |
            release-assets/*.node
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
