name: Nightly

# Runs every day at 02:00 UTC on main.
# Builds all platforms, runs full test suite, and reports failures via
# a GitHub issue (if the build breaks overnight).

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read
  issues:   write          # to open failure issues

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  Build + test across all platforms and Node versions
  # ─────────────────────────────────────────────────────────────────
  nightly-matrix:
    name: Nightly · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64-node18
            os: ubuntu-latest
            node: '18'
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends build-essential libnode-dev

          - label: linux-x64-node20
            os: ubuntu-latest
            node: '20'
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends build-essential libnode-dev

          - label: linux-x64-node22
            os: ubuntu-latest
            node: '22'
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends build-essential libnode-dev

          - label: linux-arm64-node20
            os: ubuntu-24.04-arm
            node: '20'
            setup: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends build-essential libnode-dev

          - label: macos-arm64-node20
            os: macos-latest
            node: '20'
            setup: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Build
        run: make clean && make

      - name: CLI full test
        run: |
          ./neodax -h | head -1
          ./neodax -x   /bin/ls > /dev/null && echo "  -x  OK"
          ./neodax -e   /bin/ls > /dev/null && echo "  -e  OK"
          ./neodax -V   /bin/ls > /dev/null && echo "  -V  OK"
          ./neodax -R   /bin/ls > /dev/null && echo "  -R  OK"

      - name: JS addon test
        run: node js/test/basic.js

      - name: Memory check (valgrind) — Linux only
        if: runner.os == 'Linux' && matrix.node == '20'
        continue-on-error: true
        run: |
          sudo apt-get install -y --no-install-recommends valgrind -qq 2>/dev/null || true
          if command -v valgrind &>/dev/null; then
            valgrind --error-exitcode=1 --leak-check=summary \
              ./neodax /bin/ls > /dev/null 2>&1 && echo "valgrind OK" || echo "valgrind reported issues (non-fatal)"
          else
            echo "valgrind not available — skipping"
          fi

  # ─────────────────────────────────────────────────────────────────
  #  Open a GitHub issue if nightly breaks
  # ─────────────────────────────────────────────────────────────────
  report-failure:
    name: Report failure
    needs: nightly-matrix
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Open failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const date     = new Date().toISOString().slice(0, 10);
            const runUrl   = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha      = context.sha.slice(0, 8);

            // Check for existing open nightly failure issues
            const existing = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              labels: 'nightly-failure',
              state:  'open',
            });

            if (existing.data.length > 0) {
              // Update the existing issue with a new comment
              await github.rest.issues.createComment({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                issue_number: existing.data[0].number,
                body: `🔴 Still failing on ${date} · [Run #${context.runId}](${runUrl}) · \`${sha}\``,
              });
              console.log('Updated existing failure issue #' + existing.data[0].number);
            } else {
              // Open a new issue
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  `🔴 Nightly build failed — ${date}`,
                labels: ['nightly-failure', 'bug'],
                body: [
                  `The nightly build failed on **${date}**.`,
                  '',
                  `**Commit:** \`${sha}\``,
                  `**Run:** [${context.runId}](${runUrl})`,
                  '',
                  '## Steps to reproduce',
                  '```bash',
                  'git clone https://github.com/VersaNexusIX/NeoDAX.git',
                  'cd NeoDAX',
                  'make clean && make',
                  'node js/test/basic.js',
                  '```',
                  '',
                  '## Platforms tested',
                  '- Linux x64 · Node 18/20/22',
                  '- Linux arm64 · Node 20',
                  '- macOS ARM64 · Node 20',
                  '',
                  '_This issue was opened automatically by the nightly workflow._',
                ].join('\n'),
              });
              console.log('Opened new failure issue');
            }

  # ─────────────────────────────────────────────────────────────────
  #  Close nightly failure issue when build passes again
  # ─────────────────────────────────────────────────────────────────
  report-recovery:
    name: Report recovery
    needs: nightly-matrix
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const date   = new Date().toISOString().slice(0, 10);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const existing = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              labels: 'nightly-failure',
              state:  'open',
            });

            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: `✅ Nightly build passing again on ${date}. [Run ${context.runId}](${runUrl})`,
              });
              await github.rest.issues.update({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log('Closed failure issue #' + issue.number);
            }
